<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>행운의 룰렛 게임</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #23304f;
      --muted: #66708a;
      --blue: #3b82f6;
      --green: #16a34a;
      --orange: #f97316;
      --pink: #ec4899;
      --yellow: #facc15;
      --panel: rgba(255, 255, 255, 0.94);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Malgun Gothic", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(250, 204, 21, 0.45) 0 90px, transparent 92px),
        radial-gradient(circle at 88% 12%, rgba(59, 130, 246, 0.28) 0 80px, transparent 82px),
        radial-gradient(circle at 82% 86%, rgba(236, 72, 153, 0.24) 0 120px, transparent 122px),
        linear-gradient(145deg, #eff8ff 0%, #fff7d7 48%, #ffeaf3 100%);
      padding: 18px;
    }

    main {
      width: min(1120px, 100%);
      min-height: calc(100vh - 36px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(320px, 1.1fr) minmax(280px, 0.9fr);
      gap: 18px;
      align-items: stretch;
    }

    .stage,
    .control-panel {
      background: var(--panel);
      border: 4px solid #ffffff;
      border-radius: 22px;
      box-shadow: 0 18px 42px rgba(67, 86, 124, 0.16);
    }

    .stage {
      padding: clamp(18px, 4vw, 32px);
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .control-panel {
      padding: clamp(18px, 4vw, 28px);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1.1;
      color: #1d3b7a;
    }

    .subtitle {
      margin: 10px 0 22px;
      color: var(--muted);
      font-size: clamp(16px, 3.8vw, 21px);
      font-weight: 800;
      line-height: 1.45;
    }

    .wheel-zone {
      position: relative;
      width: min(72vw, 520px);
      aspect-ratio: 1;
      margin: 0 auto 22px;
      display: grid;
      place-items: center;
    }

    .pointer {
      position: absolute;
      top: -5px;
      left: 50%;
      z-index: 4;
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-top: 42px solid #ef4444;
      filter: drop-shadow(0 5px 0 rgba(137, 28, 28, 0.24));
      transform: translateX(-50%);
    }

    .wheel {
      position: relative;
      width: 100%;
      height: 100%;
      border: 12px solid #ffffff;
      border-radius: 50%;
      background: conic-gradient(#3b82f6 0deg 45deg, #f97316 45deg 90deg, #16a34a 90deg 135deg, #ec4899 135deg 180deg, #8b5cf6 180deg 225deg, #facc15 225deg 270deg, #06b6d4 270deg 315deg, #f43f5e 315deg 360deg);
      box-shadow:
        0 18px 34px rgba(65, 78, 111, 0.22),
        inset 0 0 0 3px rgba(255, 255, 255, 0.75);
      transition: transform 4.2s cubic-bezier(0.12, 0.74, 0.18, 1);
      overflow: hidden;
    }

    .wheel::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 84px;
      height: 84px;
      background: #ffffff;
      border: 8px solid #dbeafe;
      border-radius: 50%;
      box-shadow: 0 6px 16px rgba(35, 48, 79, 0.2);
      transform: translate(-50%, -50%);
    }

    .label {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 42%;
      transform-origin: 0 0;
      color: #ffffff;
      font-size: clamp(12px, 2.8vw, 18px);
      font-weight: 900;
      line-height: 1.15;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
      word-break: keep-all;
      overflow-wrap: anywhere;
      display: flex;
      justify-content: flex-end;
      padding-right: 10px;
      pointer-events: none;
    }

    .spin-button {
      width: min(100%, 360px);
      min-height: 64px;
      margin: 0 auto;
      border: 0;
      border-radius: 18px;
      background: #2563eb;
      color: white;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 900;
      box-shadow: 0 8px 0 #1d4ed8;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .spin-button:hover {
      transform: translateY(-2px);
    }

    .spin-button:disabled {
      opacity: 0.65;
      cursor: default;
      transform: none;
    }

    .result {
      min-height: 42px;
      margin: 18px 0 0;
      font-size: clamp(20px, 4.8vw, 30px);
      font-weight: 900;
      color: #be123c;
      word-break: keep-all;
    }

    .panel-title {
      margin: 0 0 12px;
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.2;
      color: #1d3b7a;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    input {
      min-width: 0;
      height: 52px;
      border: 3px solid #dbeafe;
      border-radius: 14px;
      padding: 0 14px;
      color: var(--ink);
      font-size: 17px;
      font-weight: 800;
      outline: none;
      background: #fbfdff;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.18);
    }

    .small-button,
    .reset-button {
      height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 0 16px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .small-button {
      background: var(--green);
    }

    .reset-button {
      width: 100%;
      margin-top: 12px;
      background: var(--orange);
    }

    .items {
      display: grid;
      gap: 10px;
      overflow: auto;
      padding-right: 4px;
      min-height: 150px;
    }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 8px 9px;
      background: #f8fbff;
      border: 2px solid #e0edff;
      border-radius: 14px;
    }

    .color-dot {
      width: 24px;
      aspect-ratio: 1;
      border-radius: 50%;
      box-shadow: inset -4px -4px 0 rgba(0, 0, 0, 0.12);
    }

    .item-name {
      min-width: 0;
      font-size: 17px;
      font-weight: 900;
      overflow-wrap: anywhere;
      text-align: left;
    }

    .remove-button {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 24px;
      line-height: 1;
      font-weight: 900;
      cursor: pointer;
    }

    .hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      z-index: 10;
      max-width: min(92vw, 440px);
      padding: 14px 18px;
      border-radius: 16px;
      background: #23304f;
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
      box-shadow: 0 12px 28px rgba(35, 48, 79, 0.25);
      opacity: 0;
      transform: translate(-50%, 18px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
      }

      main {
        min-height: auto;
        grid-template-columns: 1fr;
      }

      .wheel-zone {
        width: min(88vw, 440px);
      }

      .control-panel {
        max-height: none;
      }
    }

    @media (max-width: 430px) {
      .stage,
      .control-panel {
        border-radius: 18px;
        border-width: 3px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .small-button {
        width: 100%;
      }

      .wheel {
        border-width: 8px;
      }

      .wheel::after {
        width: 64px;
        height: 64px;
        border-width: 6px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-labelledby="appTitle">
      <h1 id="appTitle">행운의 룰렛</h1>
      <p class="subtitle">항목을 넣고 버튼을 누르면 룰렛이 돌아가요!</p>

      <div class="wheel-zone">
        <div class="pointer" aria-hidden="true"></div>
        <div class="wheel" id="wheel" aria-label="룰렛 판"></div>
      </div>

      <button class="spin-button" id="spinButton" type="button">룰렛 돌리기</button>
      <p class="result" id="resultText" aria-live="polite">오늘의 선택은?</p>
    </section>

    <aside class="control-panel" aria-labelledby="panelTitle">
      <h2 class="panel-title" id="panelTitle">룰렛 항목</h2>
      <div class="input-row">
        <input id="itemInput" type="text" maxlength="16" placeholder="예: 발표하기">
        <button class="small-button" id="addButton" type="button">추가</button>
      </div>

      <div class="items" id="itemsList" aria-label="룰렛 항목 목록"></div>
      <button class="reset-button" id="resetButton" type="button">기본 항목으로 되돌리기</button>
      <p class="hint">항목은 2개 이상 있어야 룰렛을 돌릴 수 있어요. 수업 활동, 모둠 이름, 발표 순서 정하기에 사용할 수 있습니다.</p>
    </aside>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const defaultItems = ["1모둠", "2모둠", "3모둠", "4모둠", "5모둠", "6모둠"];
    const colors = ["#3b82f6", "#f97316", "#16a34a", "#ec4899", "#8b5cf6", "#facc15", "#06b6d4", "#f43f5e", "#14b8a6", "#fb7185"];

    const wheel = document.getElementById("wheel");
    const spinButton = document.getElementById("spinButton");
    const resultText = document.getElementById("resultText");
    const itemInput = document.getElementById("itemInput");
    const addButton = document.getElementById("addButton");
    const resetButton = document.getElementById("resetButton");
    const itemsList = document.getElementById("itemsList");
    const toast = document.getElementById("toast");

    let items = [...defaultItems];
    let rotation = 0;
    let spinning = false;
    let toastTimer = null;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 1800);
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function renderItems() {
      itemsList.innerHTML = items.map((item, index) => `
        <div class="item">
          <span class="color-dot" style="background:${colors[index % colors.length]}"></span>
          <span class="item-name">${escapeHtml(item)}</span>
          <button class="remove-button" type="button" data-index="${index}" aria-label="${escapeHtml(item)} 삭제">×</button>
        </div>
      `).join("");
    }

    function renderWheel() {
      const slice = 360 / items.length;
      const gradient = items.map((item, index) => {
        const start = index * slice;
        const end = (index + 1) * slice;
        return `${colors[index % colors.length]} ${start}deg ${end}deg`;
      }).join(", ");

      wheel.style.background = `conic-gradient(${gradient})`;
      wheel.innerHTML = items.map((item, index) => {
        const angle = index * slice + slice / 2;
        return `<span class="label" style="transform: rotate(${angle}deg) translateY(-50%);">${escapeHtml(item)}</span>`;
      }).join("");

      spinButton.disabled = items.length < 2 || spinning;
    }

    function updateApp() {
      renderItems();
      renderWheel();
    }

    function addItem() {
      const value = itemInput.value.trim();

      if (!value) {
        showToast("추가할 항목을 입력해 주세요.");
        itemInput.focus();
        return;
      }

      if (items.includes(value)) {
        showToast("이미 있는 항목이에요.");
        itemInput.select();
        return;
      }

      if (items.length >= 12) {
        showToast("항목은 최대 12개까지 넣을 수 있어요.");
        return;
      }

      items.push(value);
      itemInput.value = "";
      resultText.textContent = "좋아요! 이제 룰렛을 돌려 보세요.";
      updateApp();
      itemInput.focus();
    }

    function removeItem(index) {
      if (spinning) {
        return;
      }

      if (items.length <= 2) {
        showToast("항목은 최소 2개가 필요해요.");
        return;
      }

      const removed = items.splice(index, 1);
      resultText.textContent = `${removed[0]} 항목을 뺐어요.`;
      updateApp();
    }

    function spinWheel() {
      if (spinning || items.length < 2) {
        return;
      }

      spinning = true;
      spinButton.disabled = true;
      resultText.textContent = "빙글빙글 돌아가는 중...";

      const slice = 360 / items.length;
      const winnerIndex = Math.floor(Math.random() * items.length);
      const targetCenter = winnerIndex * slice + slice / 2;
      const fullSpins = 5 + Math.floor(Math.random() * 3);
      const currentRotation = ((rotation % 360) + 360) % 360;
      const targetRotation = fullSpins * 360 + (360 - targetCenter) - currentRotation;

      rotation += targetRotation;
      wheel.style.transform = `rotate(${rotation}deg)`;

      window.setTimeout(() => {
        spinning = false;
        spinButton.disabled = false;
        resultText.textContent = `결과: ${items[winnerIndex]}`;
      }, 4300);
    }

    function resetItems() {
      if (spinning) {
        return;
      }

      items = [...defaultItems];
      resultText.textContent = "기본 항목으로 돌아왔어요.";
      updateApp();
    }

    itemsList.addEventListener("click", (event) => {
      const button = event.target.closest(".remove-button");
      if (!button) {
        return;
      }

      removeItem(Number(button.dataset.index));
    });

    addButton.addEventListener("click", addItem);
    spinButton.addEventListener("click", spinWheel);
    resetButton.addEventListener("click", resetItems);
    itemInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        addItem();
      }
    });

    updateApp();
  </script>
</body>
</html>
